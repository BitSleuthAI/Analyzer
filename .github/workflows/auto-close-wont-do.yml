name: Auto-close Won't Do Issues

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: number
      status:
        description: "Issue status to validate before closing"
        required: false
        default: "Won't Do"
        type: string
  issues:
    types: [edited]

jobs:
  close_wont_do:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: read

    steps:
      - name: Auto-close the issue when status is Won't Do
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;

            // Get issue number from context or manual input
            const issue_number =
              context.issue?.number ??
              Number(core.getInput("issue_number"));

            if (!issue_number) {
              core.setFailed("No issue number provided. This workflow runs on issue edits or manual dispatch with an issue number input.");
              return;
            }

            // For issues event, check if the status was changed to "Won't Do"
            // Note: GitHub doesn't provide issue status in the payload for regular issue events.
            // This workflow relies on manual dispatch with the status parameter.
            const status = core.getInput("status");

            if (status !== "Won't Do") {
              console.log(`Issue #${issue_number} is not marked as "Won't Do" (status: ${status ?? "unknown"}). Skipping.`);
              return;
            }

            await github.rest.issues.update({
              owner: repo.owner,
              repo: repo.repo,
              issue_number,
              state: "closed"
            });

            console.log(`Issue #${issue_number} closed because its status was set to "Won't Do".`);
